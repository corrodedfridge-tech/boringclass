<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Escape</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-wrapper">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <div id="title-screen">
                <h1>CUBE<br>ESCAPE</h1>
                <p class="blink">PRESS SPACE OR TAP TO START</p>
                <div class="controls-info">
                    <p>← → or A/D to MOVE</p>
                    <p>SPACE or W or ↑ to JUMP</p>
                    <p>ESCAPE THE RISING LAVA!</p>
                </div>
            </div>
            <div id="game-over-screen" class="hidden">
                <h1>GAME OVER</h1>
                <p id="final-score"></p>
                <p id="high-score-display"></p>
                <p class="blink">PRESS SPACE OR TAP TO RETRY</p>
            </div>
            <div id="win-screen" class="hidden">
                <h1>YOU ESCAPED!</h1>
                <p id="win-score"></p>
                <p class="blink">PRESS SPACE OR TAP TO PLAY AGAIN</p>
            </div>
        </div>
        <div id="hud" class="hidden">
            <span id="score-display">HEIGHT: 0</span>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
